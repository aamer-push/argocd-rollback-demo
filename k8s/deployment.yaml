apiVersion: apps/v1
kind: Deployment
metadata:
  name: rollback-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rollback-demo
  template:
    metadata:
      labels:
        app: rollback-demo
    spec:
      containers:
        - name: web
          image: nginx:1.25
          ports:
            - containerPort: 80
